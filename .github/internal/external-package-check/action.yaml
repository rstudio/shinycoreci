name: External package check (per repo)
description: >
  Dispatch a remote package-checks workflow, wait for its result, and on failure
  open a Copilot remediation issue and re-target the resulting Copilot PR at the
  correct maintainer.

inputs:
  github-token:
    description: >
      GitHub App installation token scoped to the target repository. Needs
      actions:write, contents:read, issues:write, pull-requests:write.
    required: true
  copilot-token:
    description: >
      Optional user-scoped PAT used only to assign the Copilot coding agent to
      the remediation issue. If omitted, a normal issue is opened as fallback.
    required: false
    default: ""
  target-owner:
    description: Owner of the repository whose workflow should be dispatched.
    required: true
  target-repo:
    description: Repository whose workflow should be dispatched.
    required: true
  target-workflow:
    description: Workflow file (e.g. R-CMD-check.yaml) to dispatch in the target repository.
    required: true
  target-ref:
    description: Branch or ref to dispatch the target workflow on.
    required: true
  target-maintainer:
    description: GitHub login of the maintainer who should review any Copilot fix.
    required: true
  app-slug:
    description: >
      Slug of the GitHub App that issued github-token (e.g. "posit-shiny-automation").
      Used to disambiguate the dispatched run from other concurrent runs on the
      target workflow. Exposed as the app-slug output of
      actions/create-github-app-token@v2.
    required: false
    default: ""
  source-repository:
    description: Repository running this scheduler (github.repository).
    required: true
  source-run-url:
    description: URL of this scheduler workflow run.
    required: true
  dispatch-lookup-attempts:
    description: How many times to poll for the dispatched run to appear.
    required: false
    default: "30"
  dispatch-lookup-interval-seconds:
    description: Seconds between dispatch lookup attempts.
    required: false
    default: "10"
  watch-attempts:
    description: How many times to poll for the dispatched run to complete.
    required: false
    default: "90"
  watch-interval-seconds:
    description: Seconds between watch attempts.
    required: false
    default: "60"
  pr-fixup-attempts:
    description: How many times to poll for the Copilot PR to appear before giving up on reviewer fixup.
    required: false
    default: "20"
  pr-fixup-interval-seconds:
    description: Seconds between Copilot PR lookup attempts.
    required: false
    default: "30"

outputs:
  run_conclusion:
    description: Conclusion reported by the dispatched remote workflow run.
    value: ${{ steps.watch.outputs.run_conclusion }}
  run_url:
    description: URL of the dispatched remote workflow run.
    value: ${{ steps.watch.outputs.run_url }}
  issue_url:
    description: URL of the remediation issue (if one was created or reused).
    value: ${{ steps.issue.outputs.issue_url }}
  issue_assigned_to_copilot:
    description: Whether the remediation issue is assigned to the Copilot coding agent.
    value: ${{ steps.issue.outputs.issue_assigned_to_copilot }}

runs:
  using: composite
  steps:
    - name: Dispatch remote workflow
      id: dispatch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TARGET_OWNER: ${{ inputs.target-owner }}
        TARGET_REPO: ${{ inputs.target-repo }}
        TARGET_WORKFLOW: ${{ inputs.target-workflow }}
        TARGET_REF: ${{ inputs.target-ref }}
      run: |
        set -euo pipefail

        dispatched_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
        echo "dispatched_at=${dispatched_at}" >> "$GITHUB_OUTPUT"

        echo "Dispatching ${TARGET_OWNER}/${TARGET_REPO} ${TARGET_WORKFLOW} on ${TARGET_REF}."
        gh api \
          --method POST \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "/repos/${TARGET_OWNER}/${TARGET_REPO}/actions/workflows/${TARGET_WORKFLOW}/dispatches" \
          --input - <<<"$(jq -n --arg ref "${TARGET_REF}" '{ref: $ref}')"

    - name: Watch remote workflow run
      id: watch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TARGET_OWNER: ${{ inputs.target-owner }}
        TARGET_REPO: ${{ inputs.target-repo }}
        TARGET_WORKFLOW: ${{ inputs.target-workflow }}
        TARGET_REF: ${{ inputs.target-ref }}
        DISPATCHED_AT: ${{ steps.dispatch.outputs.dispatched_at }}
        APP_SLUG: ${{ inputs.app-slug }}
        LOOKUP_ATTEMPTS: ${{ inputs.dispatch-lookup-attempts }}
        LOOKUP_INTERVAL: ${{ inputs.dispatch-lookup-interval-seconds }}
        WATCH_ATTEMPTS: ${{ inputs.watch-attempts }}
        WATCH_INTERVAL: ${{ inputs.watch-interval-seconds }}
      run: |
        set -euo pipefail

        # The App token's effective actor is "<app-slug>[bot]". Used to filter
        # concurrent runs on the same workflow down to the one we dispatched.
        bot_login=""
        if [[ -n "${APP_SLUG}" ]]; then
          bot_login="${APP_SLUG}[bot]"
        fi

        run_id=""
        for _ in $(seq 1 "${LOOKUP_ATTEMPTS}"); do
          response="$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${TARGET_OWNER}/${TARGET_REPO}/actions/workflows/${TARGET_WORKFLOW}/runs?event=workflow_dispatch&branch=${TARGET_REF}&per_page=20")"

          run_id="$(jq -r \
            --arg dispatched_at "${DISPATCHED_AT}" \
            --arg bot_login "${bot_login}" \
            '[
              .workflow_runs[]
              | select(.created_at >= $dispatched_at)
            ]
            | sort_by(.created_at)
            | (
                map(select(($bot_login != "") and ((.triggering_actor.login // .actor.login // "") == $bot_login)))
                | first
              ) // first
            | .id // empty' <<<"${response}")"

          [[ -n "${run_id}" ]] && break
          sleep "${LOOKUP_INTERVAL}"
        done

        if [[ -z "${run_id}" ]]; then
          echo "run_conclusion=dispatch_not_found" >> "$GITHUB_OUTPUT"
          echo "should_open_issue=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

        for _ in $(seq 1 "${WATCH_ATTEMPTS}"); do
          run_json="$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${TARGET_OWNER}/${TARGET_REPO}/actions/runs/${run_id}")"

          status="$(jq -r '.status' <<<"${run_json}")"
          conclusion="$(jq -r '.conclusion // ""' <<<"${run_json}")"
          run_url="$(jq -r '.html_url' <<<"${run_json}")"
          echo "Remote status: ${status}${conclusion:+ (${conclusion})}"

          if [[ "${status}" == "completed" ]]; then
            echo "run_url=${run_url}" >> "$GITHUB_OUTPUT"
            echo "run_conclusion=${conclusion}" >> "$GITHUB_OUTPUT"
            case "${conclusion}" in
              failure|timed_out|action_required|startup_failure|stale)
                echo "should_open_issue=true" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "should_open_issue=false" >> "$GITHUB_OUTPUT"
                ;;
            esac
            exit 0
          fi

          sleep "${WATCH_INTERVAL}"
        done

        echo "run_url=https://github.com/${TARGET_OWNER}/${TARGET_REPO}/actions/runs/${run_id}" >> "$GITHUB_OUTPUT"
        echo "run_conclusion=watch_timeout" >> "$GITHUB_OUTPUT"
        echo "should_open_issue=true" >> "$GITHUB_OUTPUT"

    - name: Open remediation issue
      id: issue
      if: steps.watch.outputs.should_open_issue == 'true'
      uses: ./.github/internal/create-copilot-remediation-issue
      with:
        github-token: ${{ inputs.github-token }}
        copilot-token: ${{ inputs.copilot-token }}
        source-repository: ${{ inputs.source-repository }}
        source-run-url: ${{ inputs.source-run-url }}
        target-owner: ${{ inputs.target-owner }}
        target-repo: ${{ inputs.target-repo }}
        target-ref: ${{ inputs.target-ref }}
        target-workflow: ${{ inputs.target-workflow }}
        target-maintainer: ${{ inputs.target-maintainer }}
        remote-run-conclusion: ${{ steps.watch.outputs.run_conclusion }}
        remote-run-url: ${{ steps.watch.outputs.run_url }}

    - name: Re-target Copilot PR to maintainer
      id: pr-fixup
      if: steps.issue.outputs.issue_url != '' && steps.issue.outputs.issue_assigned_to_copilot == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        COPILOT_GH_TOKEN: ${{ inputs.copilot-token }}
        TARGET_OWNER: ${{ inputs.target-owner }}
        TARGET_REPO: ${{ inputs.target-repo }}
        TARGET_MAINTAINER: ${{ inputs.target-maintainer }}
        ISSUE_URL: ${{ steps.issue.outputs.issue_url }}
        PR_FIXUP_ATTEMPTS: ${{ inputs.pr-fixup-attempts }}
        PR_FIXUP_INTERVAL: ${{ inputs.pr-fixup-interval-seconds }}
      run: |
        set -euo pipefail

        # The Copilot PR is authored by whoever holds the user-scoped PAT that
        # assigned the coding agent. GitHub auto-adds that user as reviewer and
        # assignee on the resulting PR, which is the wrong person for a
        # cross-repo scheduler. Replace them with the target repo's maintainer.

        pat_owner=""
        if [[ -n "${COPILOT_GH_TOKEN}" ]]; then
          pat_owner="$(GH_TOKEN="${COPILOT_GH_TOKEN}" gh api /user --jq '.login' 2>/dev/null || true)"
        fi

        if [[ -z "${pat_owner}" ]]; then
          echo "::warning::Could not resolve PAT owner login; continuing without PAT owner cleanup."
        else
          echo "PAT owner resolved as: ${pat_owner}"
        fi

        issue_number="${ISSUE_URL##*/}"

        # Poll for a PR that declares it closes this issue. Copilot links the
        # PR to the issue via the "Development" section, which populates
        # closingIssuesReferences in GraphQL.
        pr_number=""
        for attempt in $(seq 1 "${PR_FIXUP_ATTEMPTS}"); do
          pr_number="$(gh api graphql \
            -f query='
              query($owner:String!,$repo:String!,$issue:Int!) {
                repository(owner:$owner,name:$repo) {
                  issue(number:$issue) {
                    timelineItems(first:50, itemTypes:[CONNECTED_EVENT, CROSS_REFERENCED_EVENT]) {
                      nodes {
                        __typename
                        ... on ConnectedEvent { subject { ... on PullRequest { number state isDraft } } }
                        ... on CrossReferencedEvent { source { ... on PullRequest { number state isDraft } } }
                      }
                    }
                  }
                }
              }' \
            -f owner="${TARGET_OWNER}" \
            -f repo="${TARGET_REPO}" \
            -F issue="${issue_number}" \
            --jq '[
              .data.repository.issue.timelineItems.nodes[]
              | (.subject // .source)
              | select(type == "object" and .number != null and .state == "OPEN")
              | .number
            ] | first // empty')"

          if [[ -n "${pr_number}" ]]; then
            break
          fi
          echo "Attempt ${attempt}: no linked Copilot PR yet; waiting."
          sleep "${PR_FIXUP_INTERVAL}"
        done

        if [[ -z "${pr_number}" ]]; then
          echo "::error::No Copilot PR linked to ${ISSUE_URL} after ${PR_FIXUP_ATTEMPTS} attempts; reviewer fixup failed."
          exit 1
        fi

        echo "Found Copilot PR #${pr_number}; re-targeting reviewers/assignees."

        if [[ -n "${pat_owner}" ]]; then
          # Remove PAT owner as requested reviewer (ignore if not present).
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            "/repos/${TARGET_OWNER}/${TARGET_REPO}/pulls/${pr_number}/requested_reviewers" \
            -f "reviewers[]=${pat_owner}" >/dev/null 2>&1 || true
        fi

        reviewer_required=true

        # GitHub will not request review from the same user context that started
        # the Copilot task, so only enforce reviewer routing when they differ.
        if [[ -z "${pat_owner}" || "${TARGET_MAINTAINER}" != "${pat_owner}" ]]; then
          current_reviewers="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${TARGET_OWNER}/${TARGET_REPO}/pulls/${pr_number}/requested_reviewers" \
            --jq '[.users[].login]')"

          if ! jq -e --arg login "${TARGET_MAINTAINER}" 'index($login)' <<<"${current_reviewers}" >/dev/null; then
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${TARGET_OWNER}/${TARGET_REPO}/pulls/${pr_number}/requested_reviewers" \
              -f "reviewers[]=${TARGET_MAINTAINER}" >/dev/null \
              || {
                echo "::error::Could not request review from @${TARGET_MAINTAINER} on PR #${pr_number}."
                exit 1
              }
          fi
        else
          reviewer_required=false
          echo "Maintainer matches the Copilot token owner; skipping requested-reviewer enforcement."
        fi

        if [[ -n "${pat_owner}" ]]; then
          # Swap assignees: remove PAT owner, add maintainer.
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            "/repos/${TARGET_OWNER}/${TARGET_REPO}/issues/${pr_number}/assignees" \
            -f "assignees[]=${pat_owner}" >/dev/null 2>&1 || true
        fi

        current_assignees="$(gh api \
          -H "Accept: application/vnd.github+json" \
          "/repos/${TARGET_OWNER}/${TARGET_REPO}/issues/${pr_number}" \
          --jq '[.assignees[].login]')"

        if ! jq -e --arg login "${TARGET_MAINTAINER}" 'index($login)' <<<"${current_assignees}" >/dev/null; then
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${TARGET_OWNER}/${TARGET_REPO}/issues/${pr_number}/assignees" \
            -f "assignees[]=${TARGET_MAINTAINER}" >/dev/null \
            || {
              echo "::error::Could not assign @${TARGET_MAINTAINER} to PR #${pr_number}."
              exit 1
            }
        fi

        final_reviewers="$(gh api \
          -H "Accept: application/vnd.github+json" \
          "/repos/${TARGET_OWNER}/${TARGET_REPO}/pulls/${pr_number}/requested_reviewers" \
          --jq '[.users[].login]')"

        final_assignees="$(gh api \
          -H "Accept: application/vnd.github+json" \
          "/repos/${TARGET_OWNER}/${TARGET_REPO}/issues/${pr_number}" \
          --jq '[.assignees[].login]')"

        if [[ "${reviewer_required}" == "true" ]] && ! jq -e --arg login "${TARGET_MAINTAINER}" 'index($login)' <<<"${final_reviewers}" >/dev/null; then
          echo "::error::Maintainer @${TARGET_MAINTAINER} is not a requested reviewer on PR #${pr_number}."
          exit 1
        fi

        if ! jq -e --arg login "${TARGET_MAINTAINER}" 'index($login)' <<<"${final_assignees}" >/dev/null; then
          echo "::error::Maintainer @${TARGET_MAINTAINER} is not assigned to PR #${pr_number}."
          exit 1
        fi

        echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"
        echo "Re-targeted PR #${pr_number} to @${TARGET_MAINTAINER}."

    - name: Fail job if remote checks did not succeed
      if: steps.watch.outputs.run_conclusion != 'success'
      shell: bash
      env:
        TARGET_OWNER: ${{ inputs.target-owner }}
        TARGET_REPO: ${{ inputs.target-repo }}
        REMOTE_RUN_CONCLUSION: ${{ steps.watch.outputs.run_conclusion }}
        REMOTE_RUN_URL: ${{ steps.watch.outputs.run_url }}
        ISSUE_URL: ${{ steps.issue.outputs.issue_url }}
        ISSUE_MODE: ${{ steps.issue.outputs.issue_mode }}
      run: |
        set -euo pipefail

        echo "::error::Remote package checks for ${TARGET_OWNER}/${TARGET_REPO} did not succeed (${REMOTE_RUN_CONCLUSION:-unknown})."
        [[ -n "${REMOTE_RUN_URL}" ]] && echo "::error::Remote run: ${REMOTE_RUN_URL}"
        [[ -n "${ISSUE_URL}" ]] && echo "::error::Remediation issue (${ISSUE_MODE:-unknown}): ${ISSUE_URL}"

        {
          echo "## ${TARGET_OWNER}/${TARGET_REPO} handoff"
          echo ""
          echo "- Remote conclusion: ${REMOTE_RUN_CONCLUSION:-unknown}"
          [[ -n "${REMOTE_RUN_URL}" ]] && echo "- Remote run: ${REMOTE_RUN_URL}"
          if [[ -n "${ISSUE_URL}" ]]; then
            echo "- Remediation issue (${ISSUE_MODE:-unknown}): ${ISSUE_URL}"
          else
            echo "- Remediation issue: not created"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

        if [[ "${REMOTE_RUN_CONCLUSION}" == "dispatch_not_found" ]]; then
          echo "::error::The remote workflow dispatch succeeded, but no matching workflow run could be found to watch."
        fi

        exit 1
