name: Create remediation issue
description: Create or reuse a remediation issue for a failing remote workflow run.

inputs:
  github-token:
    description: GitHub App token with permission to read and create issues in the target repository.
    required: true
  source-repository:
    description: Repository running the scheduler workflow.
    required: true
  source-run-url:
    description: URL of the scheduler workflow run.
    required: true
  target-owner:
    description: Owner of the repository whose workflow was dispatched.
    required: true
  target-repo:
    description: Repository whose workflow was dispatched.
    required: true
  target-ref:
    description: Branch or ref used for the remote workflow dispatch.
    required: true
  target-workflow:
    description: Workflow file dispatched in the remote repository.
    required: true
  target-maintainer:
    description: Maintainer who should review any automated fix.
    required: true
  remote-run-conclusion:
    description: Final conclusion reported by the remote workflow run.
    required: true
  remote-run-url:
    description: URL of the remote workflow run.
    required: false
    default: ""
  issue-title:
    description: Optional override for the remediation issue title.
    required: false
    default: ""
  custom-instructions:
    description: Optional additional remediation instructions to include in the issue.
    required: false
    default: ""
  issue-labels:
    description: >
      Comma-separated list of labels to apply to the remediation issue. Each
      label is auto-created in the target repository if it does not already
      exist.
    required: false
    default: "ai-generated-issue"

outputs:
  issue_url:
    description: URL of the existing or newly created issue.
    value: ${{ steps.create.outputs.issue_url }}
  issue_number:
    description: Number of the existing or newly created issue.
    value: ${{ steps.create.outputs.issue_number }}
  issue_mode:
    description: Whether the issue was reused or created.
    value: ${{ steps.create.outputs.issue_mode }}
  existing_pr_url:
    description: >
      URL of an already-open pull request cross-referenced from the reused
      issue, when one exists. Empty when the issue was newly created or has no
      open linked PR.
    value: ${{ steps.create.outputs.existing_pr_url }}

runs:
  using: composite
  steps:
    - name: Create or reuse issue
      id: create
      shell: bash
      env:
        APP_GH_TOKEN: ${{ inputs.github-token }}
        SOURCE_REPOSITORY: ${{ inputs.source-repository }}
        SOURCE_RUN_URL: ${{ inputs.source-run-url }}
        TARGET_OWNER: ${{ inputs.target-owner }}
        TARGET_REPO: ${{ inputs.target-repo }}
        TARGET_REF: ${{ inputs.target-ref }}
        TARGET_WORKFLOW: ${{ inputs.target-workflow }}
        TARGET_MAINTAINER: ${{ inputs.target-maintainer }}
        REMOTE_RUN_CONCLUSION: ${{ inputs.remote-run-conclusion }}
        REMOTE_RUN_URL: ${{ inputs.remote-run-url }}
        INPUT_ISSUE_TITLE: ${{ inputs.issue-title }}
        INPUT_CUSTOM_INSTRUCTIONS: ${{ inputs.custom-instructions }}
        INPUT_ISSUE_LABELS: ${{ inputs.issue-labels }}
      run: |
        set -euo pipefail

        create_issue() {
          local payload="$1"

          GH_TOKEN="${APP_GH_TOKEN}" gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${TARGET_OWNER}/${TARGET_REPO}/issues" \
            --input - <<<"${payload}" 2>&1
        }

        write_issue_outputs() {
          local issue_json="$1"
          local issue_mode="$2"
          local existing_pr_url="${3:-}"

          issue_url="$(jq -r '.html_url' <<<"${issue_json}")"
          issue_number="$(jq -r '.number' <<<"${issue_json}")"

          echo "issue_url=${issue_url}" >> "$GITHUB_OUTPUT"
          echo "issue_number=${issue_number}" >> "$GITHUB_OUTPUT"
          echo "issue_mode=${issue_mode}" >> "$GITHUB_OUTPUT"
          echo "existing_pr_url=${existing_pr_url}" >> "$GITHUB_OUTPUT"
        }

        find_open_linked_pr() {
          local issue_number="$1"

          GH_TOKEN="${APP_GH_TOKEN}" gh api graphql \
            -f query='query($owner:String!,$repo:String!,$number:Int!){repository(owner:$owner,name:$repo){issue(number:$number){timelineItems(first:100,itemTypes:[CROSS_REFERENCED_EVENT]){nodes{__typename ... on CrossReferencedEvent{source{__typename ... on PullRequest{url state isDraft}}}}}}}}' \
            -F owner="${TARGET_OWNER}" -F repo="${TARGET_REPO}" -F number="${issue_number}" \
            --jq '[.data.repository.issue.timelineItems.nodes[].source | select(.__typename=="PullRequest" and .state=="OPEN") | .url] | first // empty' 2>/dev/null || true
        }

        reuse_issue() {
          local issue_json="$1"
          local existing_issue_number
          existing_issue_number="$(jq -r '.number' <<<"${issue_json}")"
          local existing_pr_url
          existing_pr_url="$(find_open_linked_pr "${existing_issue_number}")"

          write_issue_outputs "${issue_json}" "existing" "${existing_pr_url}"
          echo "Open remediation issue already exists: ${issue_url}"
          if [[ -n "${existing_pr_url}" ]]; then
            echo "Open remediation PR already linked: ${existing_pr_url}"
          fi
          exit 0
        }

        if [[ -n "${INPUT_ISSUE_TITLE}" ]]; then
          title="${INPUT_ISSUE_TITLE}"
        else
          title="Automated fix: ${TARGET_REPO} package checks failing on ${TARGET_REF}"
        fi

        # Parse the comma-separated label list into a clean JSON array, then
        # ensure each label exists in the target repository so the issue
        # creation call below does not fail with "label does not exist".
        labels_json="$(jq -nc \
          --arg raw "${INPUT_ISSUE_LABELS}" \
          '[$raw | split(",") | .[] | gsub("^\\s+|\\s+$"; "") | select(length > 0)] | unique')"

        ensure_label_exists() {
          local label="$1"

          if GH_TOKEN="${APP_GH_TOKEN}" gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${TARGET_OWNER}/${TARGET_REPO}/labels/$(jq -rn --arg s "${label}" '$s|@uri')" \
              >/dev/null 2>&1; then
            return 0
          fi

          local payload
          payload="$(jq -n \
            --arg name "${label}" \
            --arg color "ededed" \
            --arg description "Automatically opened by shinycoreci scheduler with AI assistance." \
            '{name: $name, color: $color, description: $description}')"

          GH_TOKEN="${APP_GH_TOKEN}" gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${TARGET_OWNER}/${TARGET_REPO}/labels" \
            --input - <<<"${payload}" >/dev/null 2>&1 || true
        }

        while IFS= read -r label; do
          [[ -n "${label}" ]] && ensure_label_exists "${label}"
        done < <(jq -r '.[]' <<<"${labels_json}")

        remediation_marker="shinycoreci-remediation: ${TARGET_OWNER}/${TARGET_REPO}:${TARGET_WORKFLOW}:${TARGET_REF}"

        find_existing_issue() {
          GH_TOKEN="${APP_GH_TOKEN}" gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${TARGET_OWNER}/${TARGET_REPO}/issues?state=open&per_page=100" \
            | jq -s -c -r \
              --arg title "${title}" \
              --arg marker "${remediation_marker}" \
              '[
                .[][]
                | select(.pull_request | not)
                | select((.title == $title) or ((.body // "") | contains($marker)))
              ]
              | sort_by(.created_at)
              | first // empty'
        }

        existing_issue_json="$(find_existing_issue || true)"

        if [[ -n "${existing_issue_json}" ]]; then
          reuse_issue "${existing_issue_json}"
        fi

        conventional_pr_title_sentence="Use a Conventional Commits pull request title following https://www.conventionalcommits.org/en/v1.0.0/ in the form \`<type>(optional scope): <description>\` or \`<type>: <description>\`, choosing the type and scope that match the actual change. Prefer \`fix(ci): ...\` for package-check fixes."
        review_handoff_sentence="Reviewer and assignee handoff is handled centrally by \`${SOURCE_REPOSITORY}\`; do not add a separate workflow just to request maintainer review. If scheduler compatibility requires a workflow change in this repository, limit it to \`${TARGET_WORKFLOW}\`."

        body_lines=(
          "<!-- ${remediation_marker} -->"
          ""
          "> [!NOTE]"
          "> This issue was opened automatically by the \`${SOURCE_REPOSITORY}\` scheduler. An AI-assisted solver may attempt a fix; review carefully before merging."
          ""
          "## Summary"
          ""
          "The scheduled package checks triggered from \`${SOURCE_REPOSITORY}\` failed for \`${TARGET_OWNER}/${TARGET_REPO}\` on \`${TARGET_REF}\`."
          ""
          "## Failure details"
          ""
          "| Field | Value |"
          "| --- | --- |"
          "| Target repository | \`${TARGET_OWNER}/${TARGET_REPO}\` |"
          "| Target ref | \`${TARGET_REF}\` |"
          "| Remote workflow | \`${TARGET_WORKFLOW}\` |"
          "| Remote conclusion | \`${REMOTE_RUN_CONCLUSION}\` |"
          "| Remote run | ${REMOTE_RUN_URL:-not available} |"
          "| Source scheduler | \`${SOURCE_REPOSITORY}\` |"
          "| Scheduler run | ${SOURCE_RUN_URL} |"
          "| Suggested maintainer | @${TARGET_MAINTAINER} |"
          ""
          "## Next steps"
          ""
          "1. An AWS Bedrock-backed Anthropic solver will attempt to investigate this failure and open a pull request against \`${TARGET_REF}\` when Bedrock credentials are configured for the scheduler."
          "2. ${conventional_pr_title_sentence}"
          "3. ${review_handoff_sentence}"
        )

        if [[ -n "${INPUT_CUSTOM_INSTRUCTIONS}" ]]; then
          body_lines+=(
            ""
            "## Additional instructions"
            ""
            "${INPUT_CUSTOM_INSTRUCTIONS}"
          )
        fi

        printf -v issue_body '%s\n' "${body_lines[@]}"
        issue_body="${issue_body%$'\n'}"

        payload="$(jq -n \
          --arg title "${title}" \
          --arg body "${issue_body}" \
          --arg maintainer "${TARGET_MAINTAINER}" \
          --argjson labels "${labels_json}" \
          '{
            title: $title,
            body: $body,
            assignees: [$maintainer],
            labels: $labels
          }')"

        set +e
        issue_response="$(create_issue "${payload}")"
        status=$?
        set -e

        if [[ ${status} -ne 0 ]]; then
          existing_issue_json="$(find_existing_issue || true)"
          if [[ -n "${existing_issue_json}" ]]; then
            reuse_issue "${existing_issue_json}"
          fi

          echo "::error::Failed to create remediation issue."
          echo "${issue_response}"
          exit ${status}
        fi

        write_issue_outputs "${issue_response}" "created"
        echo "Created remediation issue (created): ${issue_url}"
