name: Create Copilot remediation issue
description: Create or reuse a remediation issue for a failing remote workflow run, assigning it to Copilot when possible.

inputs:
  github-token:
    description: GitHub App token with permission to read and create issues in the target repository.
    required: true
  copilot-token:
    description: Optional user-scoped token used only for Copilot issue assignment. Falls back to a normal issue when omitted or rejected.
    required: false
    default: ""
  source-repository:
    description: Repository running the scheduler workflow.
    required: true
  source-run-url:
    description: URL of the scheduler workflow run.
    required: true
  target-owner:
    description: Owner of the repository whose workflow was dispatched.
    required: true
  target-repo:
    description: Repository whose workflow was dispatched.
    required: true
  target-ref:
    description: Branch or ref used for the remote workflow dispatch.
    required: true
  target-workflow:
    description: Workflow file dispatched in the remote repository.
    required: true
  target-maintainer:
    description: Maintainer who should review any Copilot-generated fix.
    required: true
  remote-run-conclusion:
    description: Final conclusion reported by the remote workflow run.
    required: true
  remote-run-url:
    description: URL of the remote workflow run.
    required: false
    default: ""
  issue-title:
    description: Optional override for the remediation issue title.
    required: false
    default: ""
  custom-instructions:
    description: Optional override for Copilot instructions.
    required: false
    default: ""

outputs:
  issue_url:
    description: URL of the existing or newly created issue.
    value: ${{ steps.create.outputs.issue_url }}
  issue_mode:
    description: Whether the issue was reused, created as a Copilot-assigned issue, or created as a normal issue.
    value: ${{ steps.create.outputs.issue_mode }}

runs:
  using: composite
  steps:
    - name: Create or reuse issue
      id: create
      shell: bash
      env:
        APP_GH_TOKEN: ${{ inputs.github-token }}
        COPILOT_GH_TOKEN: ${{ inputs.copilot-token }}
        SOURCE_REPOSITORY: ${{ inputs.source-repository }}
        SOURCE_RUN_URL: ${{ inputs.source-run-url }}
        TARGET_OWNER: ${{ inputs.target-owner }}
        TARGET_REPO: ${{ inputs.target-repo }}
        TARGET_REF: ${{ inputs.target-ref }}
        TARGET_WORKFLOW: ${{ inputs.target-workflow }}
        TARGET_MAINTAINER: ${{ inputs.target-maintainer }}
        REMOTE_RUN_CONCLUSION: ${{ inputs.remote-run-conclusion }}
        REMOTE_RUN_URL: ${{ inputs.remote-run-url }}
        INPUT_ISSUE_TITLE: ${{ inputs.issue-title }}
        INPUT_CUSTOM_INSTRUCTIONS: ${{ inputs.custom-instructions }}
      run: |
        set -euo pipefail

        create_issue() {
          local token="$1"
          local payload="$2"

          GH_TOKEN="${token}" gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${TARGET_OWNER}/${TARGET_REPO}/issues" \
            --input - <<<"${payload}" 2>&1
        }

        if [[ -n "${INPUT_ISSUE_TITLE}" ]]; then
          title="${INPUT_ISSUE_TITLE}"
        else
          title="Automated fix: ${TARGET_REPO} package checks failing on ${TARGET_REF}"
        fi

        existing_issue_url="$(GH_TOKEN="${APP_GH_TOKEN}" gh api \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "/repos/${TARGET_OWNER}/${TARGET_REPO}/issues?state=open&per_page=100" \
          | jq -r --arg title "${title}" '.[] | select(.pull_request | not) | select(.title == $title) | .html_url' \
          | head -n 1 || true)"

        if [[ -n "${existing_issue_url}" ]]; then
          echo "issue_url=${existing_issue_url}" >> "$GITHUB_OUTPUT"
          echo "issue_mode=existing" >> "$GITHUB_OUTPUT"
          echo "Open remediation issue already exists: ${existing_issue_url}"
          exit 0
        fi

        conventional_pr_title_sentence="Use a Conventional Commits pull request title following https://www.conventionalcommits.org/en/v1.0.0/ in the form \`<type>(optional scope): <description>\` or \`<type>: <description>\`, choosing the type and scope that match the actual change."

        if [[ -n "${INPUT_CUSTOM_INSTRUCTIONS}" ]]; then
          instructions="${INPUT_CUSTOM_INSTRUCTIONS} ${conventional_pr_title_sentence}"
        else
          instructions="Investigate the failing package checks workflow run linked in this issue. Create a pull request against ${TARGET_REF} with the fix. ${conventional_pr_title_sentence} Request review from @${TARGET_MAINTAINER} before finishing."
        fi

        copilot_body_lines=(
          "The scheduled package checks triggered from \`${SOURCE_REPOSITORY}\` failed for \`${TARGET_OWNER}/${TARGET_REPO}\` on \`${TARGET_REF}\`."
          ""
          "- Remote workflow: \`${TARGET_WORKFLOW}\`"
          "- Remote conclusion: \`${REMOTE_RUN_CONCLUSION}\`"
          "- Remote run: ${REMOTE_RUN_URL:-not available}"
          "- Source scheduler run: ${SOURCE_RUN_URL}"
          ""
          "@copilot please investigate this failure. Create a pull request against \`${TARGET_REF}\` with the fix. ${conventional_pr_title_sentence} Request review from @${TARGET_MAINTAINER} before finishing."
        )

        fallback_body_lines=(
          "The scheduled package checks triggered from \`${SOURCE_REPOSITORY}\` failed for \`${TARGET_OWNER}/${TARGET_REPO}\` on \`${TARGET_REF}\`."
          ""
          "- Remote workflow: \`${TARGET_WORKFLOW}\`"
          "- Remote conclusion: \`${REMOTE_RUN_CONCLUSION}\`"
          "- Remote run: ${REMOTE_RUN_URL:-not available}"
          "- Source scheduler run: ${SOURCE_RUN_URL}"
          "- Suggested maintainer: @${TARGET_MAINTAINER}"
          ""
          "Automatic Copilot assignment was unavailable for this run, so this issue was opened without a Copilot assignee."
          "If you later reassign this issue to Copilot, ask it to use a Conventional Commits pull request title in the form \`<type>(optional scope): <description>\` or \`<type>: <description>\` that matches the actual change."
          "Please investigate manually or reassign this issue to Copilot from the GitHub issue UI using a user-scoped account with access to ${TARGET_OWNER}/${TARGET_REPO}."
        )

        printf -v copilot_body '%s\n' "${copilot_body_lines[@]}"
        copilot_body="${copilot_body%$'\n'}"

        printf -v fallback_body '%s\n' "${fallback_body_lines[@]}"
        fallback_body="${fallback_body%$'\n'}"

        copilot_payload="$(jq -n \
          --arg title "${title}" \
          --arg body "${copilot_body}" \
          --arg target_repo "${TARGET_OWNER}/${TARGET_REPO}" \
          --arg base_branch "${TARGET_REF}" \
          --arg instructions "${instructions}" \
          '{
            title: $title,
            body: $body,
            assignees: ["copilot-swe-agent[bot]"],
            agent_assignment: {
              target_repo: $target_repo,
              base_branch: $base_branch,
              custom_instructions: $instructions
            }
          }')"

        fallback_payload="$(jq -n \
          --arg title "${title}" \
          --arg body "${fallback_body}" \
          '{
            title: $title,
            body: $body
          }')"

        issue_mode=""

        if [[ -n "${COPILOT_GH_TOKEN}" ]]; then
          set +e
          issue_response="$(create_issue "${COPILOT_GH_TOKEN}" "${copilot_payload}")"
          status=$?
          set -e

          if [[ ${status} -eq 0 ]]; then
            issue_mode="copilot_assigned"
          else
            echo "::warning::Failed to create a Copilot-assigned remediation issue. Falling back to a normal issue created by the GitHub App token."
            echo "${issue_response}"
          fi
        else
          echo "::notice::No user-scoped Copilot token configured. Creating a normal remediation issue with the GitHub App token."
        fi

        if [[ -z "${issue_mode}" ]]; then
          set +e
          issue_response="$(create_issue "${APP_GH_TOKEN}" "${fallback_payload}")"
          status=$?
          set -e

          if [[ ${status} -ne 0 ]]; then
            echo "::error::Failed to create remediation issue."
            echo "${issue_response}"
            exit ${status}
          fi

          issue_mode="normal"
        fi

        issue_url="$(jq -r '.html_url' <<<"${issue_response}")"
        echo "issue_url=${issue_url}" >> "$GITHUB_OUTPUT"
        echo "issue_mode=${issue_mode}" >> "$GITHUB_OUTPUT"
        echo "Created remediation issue (${issue_mode}): ${issue_url}"
