name: External package checks

# Dispatches package-check workflows on other repositories on a schedule, and
# opens a Copilot-assigned remediation issue against that repository when the
# remote run fails. To add a repository, append a new matrix entry below with
# the target owner, repo, workflow file, ref, and reviewing maintainer.
#
# Requirements for each target repository:
#   * The POSIT_SHINY_AUTOMATION GitHub App is installed on it.
#   * The listed workflow file supports `workflow_dispatch` on the listed ref.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1" # every Monday at 08:00 UTC

permissions:
  contents: read

jobs:
  check:
    name: ${{ matrix.owner }}/${{ matrix.repo }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        include:
          - owner: rstudio
            repo: reactlog
            workflow: R-CMD-check.yaml
            ref: main
            maintainer: schloerke
          # Template — copy, uncomment, and fill in to add another target repo:
          # - owner: rstudio
          #   repo: example
          #   workflow: R-CMD-check.yaml
          #   ref: main
          #   maintainer: github-login

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.POSIT_SHINY_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.POSIT_SHINY_AUTOMATION_PEM }}
          owner: ${{ matrix.owner }}
          repositories: ${{ matrix.repo }}

      - name: Run external package check
        uses: ./.github/internal/external-package-check
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          copilot-token: ${{ secrets.POSIT_SHINY_AUTOMATION_COPILOT_TOKEN }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}
          target-owner: ${{ matrix.owner }}
          target-repo: ${{ matrix.repo }}
          target-workflow: ${{ matrix.workflow }}
          target-ref: ${{ matrix.ref }}
          target-maintainer: ${{ matrix.maintainer }}
          source-repository: ${{ github.repository }}
          source-run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
