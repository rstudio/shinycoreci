name: Debug app permissions

# Temporary debug workflow. Mints POSIT_SHINY_AUTOMATION installation tokens
# against a target repo requesting one permission at a time so we can
# identify which permission(s) the installation does not currently grant.
# Delete after debugging.

on:
  push:
    branches:
      - r-cmd-checks-for-other-repos
    paths:
      - .github/workflows/debug-app-permissions.yml
  workflow_dispatch:
    inputs:
      target_owner:
        description: Target repository owner.
        required: false
        default: rstudio
      target_repo:
        description: Target repository name.
        required: false
        default: reactlog

permissions:
  contents: read
  id-token: write

env:
  TARGET_OWNER: ${{ github.event.inputs.target_owner || 'rstudio' }}
  TARGET_REPO: ${{ github.event.inputs.target_repo || 'reactlog' }}

jobs:
  actions-write:
    runs-on: ubuntu-latest
    steps:
      - id: t
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.POSIT_SHINY_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.POSIT_SHINY_AUTOMATION_PEM }}
          owner: ${{ env.TARGET_OWNER }}
          repositories: ${{ env.TARGET_REPO }}
          permission-actions: write
      - run: |
          if [[ "${{ steps.t.outcome }}" == "success" ]]; then
            echo "::notice::GRANTED actions:write"
          else
            echo "::error::DENIED actions:write"
            exit 1
          fi

  contents-write:
    runs-on: ubuntu-latest
    steps:
      - id: t
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.POSIT_SHINY_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.POSIT_SHINY_AUTOMATION_PEM }}
          owner: ${{ env.TARGET_OWNER }}
          repositories: ${{ env.TARGET_REPO }}
          permission-contents: write
      - run: |
          if [[ "${{ steps.t.outcome }}" == "success" ]]; then
            echo "::notice::GRANTED contents:write"
          else
            echo "::error::DENIED contents:write"
            exit 1
          fi

  issues-write:
    runs-on: ubuntu-latest
    steps:
      - id: t
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.POSIT_SHINY_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.POSIT_SHINY_AUTOMATION_PEM }}
          owner: ${{ env.TARGET_OWNER }}
          repositories: ${{ env.TARGET_REPO }}
          permission-issues: write
      - run: |
          if [[ "${{ steps.t.outcome }}" == "success" ]]; then
            echo "::notice::GRANTED issues:write"
          else
            echo "::error::DENIED issues:write"
            exit 1
          fi

  pull-requests-write:
    runs-on: ubuntu-latest
    steps:
      - id: t
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.POSIT_SHINY_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.POSIT_SHINY_AUTOMATION_PEM }}
          owner: ${{ env.TARGET_OWNER }}
          repositories: ${{ env.TARGET_REPO }}
          permission-pull-requests: write
      - run: |
          if [[ "${{ steps.t.outcome }}" == "success" ]]; then
            echo "::notice::GRANTED pull-requests:write"
          else
            echo "::error::DENIED pull-requests:write"
            exit 1
          fi

  default-no-overrides:
    runs-on: ubuntu-latest
    steps:
      - id: t
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.POSIT_SHINY_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.POSIT_SHINY_AUTOMATION_PEM }}
          owner: ${{ env.TARGET_OWNER }}
          repositories: ${{ env.TARGET_REPO }}
      - run: |
          if [[ "${{ steps.t.outcome }}" == "success" ]]; then
            echo "::notice::GRANTED default (no permission overrides)"
          else
            echo "::error::DENIED default (no permission overrides)"
            exit 1
          fi
